name: CI Checks
permissions:
    contents: read

on:
    push:
        branches: [main, feat/**]
    pull_request:
        branches: [main]

jobs:
    build-and-check:
        runs-on: ubuntu-latest
        env:
            CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup pnpm
              uses: pnpm/action-setup@v5

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "24.14.1"
                  cache: "pnpm"

            - name: Install Dependencies
              run: pnpm install --frozen-lockfile

            - name: TypeScript Check (CLI package)
              run: pnpm run tsc:check

            - name: Lint (biome)
              run: pnpm run lint

            - name: Dependency Check (knip)
              run: pnpm run knip

            - name: Run Preset Validations
              run: pnpm run validate

            - name: Run CLI unit tests with coverage (Vitest)
              run: NODE_OPTIONS=--max-old-space-size=4096 pnpm run test:coverage

            - name: Upload coverage to Codecov
              if: env.CODECOV_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
              uses: codecov/codecov-action@v5
              with:
                  token: ${{ env.CODECOV_TOKEN }}
                  files: ./coverage/lcov.info
                  fail_ci_if_error: true
