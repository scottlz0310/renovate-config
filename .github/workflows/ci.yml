name: CI Checks
permissions:
    contents: read

on:
    push:
        branches: [main, feat/**]
    pull_request:
        branches: [main]

jobs:
    build-and-check:
        runs-on: ubuntu-latest
        env:
            CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version-file: ".bun-version"

            - name: Install Dependencies
              run: bun install --frozen-lockfile

            - name: TypeScript Check (CLI package)
              run: bun run tsc:check

            - name: Lint (biome)
              run: bun run lint

            - name: Dependency Check (knip)
              run: bun run knip

            - name: Run Preset Validations
              run: bun run validate

            - name: Run CLI unit tests with coverage (Vitest)
              run: NODE_OPTIONS=--max-old-space-size=4096 bun run test:coverage

            - name: Upload coverage to Codecov
              if: env.CODECOV_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
              uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
              with:
                  token: ${{ env.CODECOV_TOKEN }}
                  files: ./coverage/lcov.info
                  fail_ci_if_error: true
